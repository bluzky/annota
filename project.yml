name: texttool
options:
  bundleIdPrefix: co.onekg
  deploymentTarget:
    macOS: "26.1"
  defaultConfig: Debug
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 965F2J8B9J
    CODE_SIGN_STYLE: Automatic
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor

packages:
  SVGPath:
    url: https://github.com/nicklockwood/SVGPath.git
    minorVersion: "1.3.0"
  swift-toml:
    url: https://github.com/mattt/swift-toml.git
    majorVersion: "2.0.0"

targets:
  AnotarCanvas:
    type: framework
    platform: macOS
    sources:
      - path: AnotarCanvas
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.onekg.AnotarCanvas
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_MODULE_VERIFIER: YES
        MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: gnu11 gnu++20
    dependencies:
      - package: SVGPath

  Annota:
    type: application
    platform: macOS
    sources:
      - path: Annota
        excludes:
          - Info.plist
    info:
      path: Annota/Info.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: Annota Canvas Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - co.onekg.annota.document
        UTExportedTypeDeclarations:
          - UTTypeConformsTo:
              - public.json
            UTTypeDescription: Annota Canvas Document
            UTTypeIdentifier: co.onekg.annota.document
            UTTypeTagSpecification:
              public.filename-extension:
                - annota
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.onekg.Annota
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: Annota/Annota.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: AnotarCanvas
        embed: true
      - package: swift-toml
        product: TOML

  AnnotaTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AnnotaTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.onekg.AnnotaTests
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Annota.app/Contents/MacOS/Annota"
    dependencies:
      - target: Annota
      - package: SVGPath

  AnnotaUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: AnnotaUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.onekg.AnnotaUITests
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TEST_TARGET_NAME: Annota
    dependencies:
      - target: Annota

schemes:
  Annota:
    build:
      targets:
        Annota: all
        AnnotaTests: [test]
        AnnotaUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: AnnotaTests
          parallelizable: true
        - name: AnnotaUITests
          parallelizable: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  AnotarCanvas:
    build:
      targets:
        AnotarCanvas: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
